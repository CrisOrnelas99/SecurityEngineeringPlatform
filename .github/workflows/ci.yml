name: Security Platform CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  node-webapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-fund --no-audit
          fi
      - run: npm run lint
      - run: npm run test --if-present
      - run: npm audit --audit-level=high || echo "npm audit found issues (non-blocking in CI)."

  python-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m compileall -q src
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt || echo "pip-audit found issues (non-blocking in CI)."

  cpp-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security_core
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ pkg-config libssl-dev libsodium-dev nlohmann-json3-dev
      - run: cmake -S . -B build
      - run: cmake --build build --config Release

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        with:
          args: --no-git --config=.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
