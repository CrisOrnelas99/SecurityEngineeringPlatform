# Lab-only exception:
# Keep ModSecurity blocking globally, but switch this honeypot route to
# DetectionOnly so the request reaches the webapp, generates HONEYPOT_TRIGGER,
# and is then handled by the threat engine auto-response flow.
SecRule REQUEST_URI "@beginsWith /admin-backup" \
    "id:1001001,phase:1,pass,nolog,ctl:ruleEngine=DetectionOnly"

# Allow DELETE for admin user management route only.
# Without this, CRS method enforcement (911100) blocks user deletion in dashboard.
SecRule REQUEST_URI "@rx ^/api/auth/users/" \
    "id:1001002,phase:1,pass,nolog,ctl:ruleRemoveById=911100"

# Extend allowed HTTP methods for this lab app to include DELETE.
# CRS default is GET HEAD POST OPTIONS and blocks DELETE otherwise.
SecAction "id:1001003,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS DELETE"
